# hyprlock — colors from Aether theme
source = ~/.config/aether/theme/hyprlock.conf

general {
    hide_cursor = true
}

background {
    monitor =
    path = ~/Pictures/wallpapers/wall.png
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = $outer_color
    inner_color = $inner_color
    font_color = $font_color
    fade_on_empty = false
    placeholder_text =   Password…
    check_color = $check_color
    fail_color = rgb(f38ba8)
    rounding = 14
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = $font_color
    font_size = 90
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = $placeholder_color
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
}
