# alacritty
[general]
# Colors generated by Aether from the current wallpaper
import = ["~/.config/aether/theme/alacritty.toml"]

[font]
size = 11.5

[font.normal]
family = "JetBrainsMono Nerd Font"

[window]
padding = { x = 12, y = 12 }
# opacity handled by Hyprland windowrule so blur applies
opacity = 1.0

[cursor.style]
shape = "Beam"

[bell]
duration = 0
